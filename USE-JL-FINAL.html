<!-- SEM dependências externas. Funciona 100% offline. -->
<style>
:root {
  --preto:#000; --branco:#fff; --off:#F5F3EF; --nude:#D8CFC4;
  --esp:#4A3F39; --taupe:#8F8177; --borda:rgba(0,0,0,0.1);
  --serif: Georgia, 'Times New Roman', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);font-weight:300;background:var(--off);color:var(--preto);font-size:14px}

/* TOPBAR */
.topbar{background:var(--preto);padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;min-height:50px}
.topbar-logo{font-family:var(--serif);font-size:13px;letter-spacing:6px;color:#fff;font-weight:700}
.topbar-title{flex:1;font-size:13px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-back{background:rgba(255,255,255,0.12);border:none;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0}

/* TELAS */
.tela{display:none;height:calc(100vh - 50px - var(--safe-top));overflow-y:auto;-webkit-overflow-scrolling:touch}
.tela.ativa{display:block}

/* HOME */
.home-hero{background:var(--preto);color:#fff;padding:24px 18px 20px;display:flex;align-items:flex-end;justify-content:space-between}
.home-eyebrow{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:5px}
.home-titulo{font-family:var(--serif);font-size:20px;letter-spacing:2px;font-weight:700}
.home-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px}
.home-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);font-size:10px;color:rgba(255,255,255,.6);padding:5px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-left:12px}

.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--borda);border-top:1px solid var(--borda)}
.stat{background:var(--branco);padding:12px;text-align:center}
.stat-num{font-family:var(--serif);font-size:22px;font-weight:700}
.stat-label{font-size:9px;color:var(--taupe);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}

.setores-titulo{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--taupe);padding:14px 16px 6px}
.setor-header{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--branco);border-bottom:1px solid var(--borda);cursor:pointer}
.setor-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.setor-nome{font-size:12px;font-weight:600;letter-spacing:.5px;flex:1}
.setor-count{font-size:11px;color:var(--taupe)}
.setor-arrow{font-size:11px;color:var(--taupe);margin-left:4px}
.loja-item{display:flex;align-items:center;gap:12px;padding:12px 16px 12px 34px;background:#fafaf8;border-bottom:1px solid var(--borda);cursor:pointer;transition:background .1s}
.loja-item:active{background:#ede9e3}
.loja-info{flex:1;min-width:0}
.loja-nome{font-size:13px;font-weight:400}
.loja-loc{font-size:10px;color:var(--taupe);margin-top:2px}
.status-dot{width:9px;height:9px;border-radius:50%;background:rgba(0,0,0,.12);flex-shrink:0}
.status-dot.comprar{background:#2F855A}
.status-dot.talvez{background:#B7791F}
.status-dot.nao{background:#C53030}
.status-dot.preenchido{background:#2B6CB0}

/* FICHA */
.ficha-wrap{padding-bottom:calc(90px + var(--safe-bot))}
.ficha-cabecalho{background:var(--preto);color:#fff;padding:18px 16px 14px}
.ficha-loja{font-family:var(--serif);font-size:18px;letter-spacing:1px;font-weight:700}
.ficha-loc-text{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px}
.ficha-badge{display:inline-block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:2px;color:#fff;margin-top:8px}

.secao{background:var(--branco);margin-bottom:2px}
.secao-titulo{background:var(--off);padding:9px 16px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);border-bottom:1px solid var(--borda)}
.campo-row{padding:11px 16px;border-bottom:1px solid var(--borda)}
.campo-row:last-child{border-bottom:none}
.campo-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--taupe);margin-bottom:7px}
.campo-input{width:100%;background:var(--off);border:1.5px solid rgba(0,0,0,.1);padding:10px 12px;font-family:var(--sans);font-size:14px;font-weight:300;color:var(--preto);border-radius:4px;outline:none;-webkit-appearance:none;appearance:none}
.campo-input:focus{border-color:var(--preto)}
textarea.campo-input{min-height:72px;resize:none;line-height:1.6}
select.campo-input{cursor:pointer}

/* ESTRELAS */
.stars-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.star-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(0,0,0,.15);background:var(--branco);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;-webkit-appearance:none}
.star-btn.on{background:var(--preto);border-color:var(--preto);color:#fff}
.star-txt{font-size:11px;color:var(--taupe);margin-top:5px;display:block}

/* COMPAT */
.compat-row{display:flex;gap:6px}
.compat-btn{flex:1;padding:10px 4px;border:1.5px solid rgba(0,0,0,.15);background:var(--branco);border-radius:4px;font-family:var(--sans);font-size:12px;color:var(--esp);cursor:pointer;text-align:center;transition:all .15s;-webkit-appearance:none}
.compat-btn.sim{background:var(--preto);color:#fff;border-color:var(--preto)}
.compat-btn.nao{background:var(--esp);color:var(--off);border-color:var(--esp)}
.compat-btn.tal{background:var(--nude);color:var(--esp);border-color:var(--nude)}

/* FOTOS */
.fotos-grid{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px}
.foto-thumb{width:82px;height:82px;border-radius:4px;object-fit:cover;border:1px solid var(--borda);cursor:pointer}
.foto-add{width:82px;height:82px;border-radius:4px;border:2px dashed rgba(0,0,0,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;background:var(--off);color:var(--taupe)}
.foto-add-icone{font-size:26px}
.foto-add-txt{font-size:10px;letter-spacing:.5px}
.foto-counter{font-size:10px;color:var(--taupe);padding:0 16px 10px}

/* VIEWER */
.foto-viewer{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.96);flex-direction:column;align-items:center;justify-content:center}
.foto-viewer.aberto{display:flex}
.foto-viewer img{max-width:100%;max-height:72vh;object-fit:contain;border-radius:2px}
.viewer-fechar{position:absolute;top:calc(var(--safe-top) + 14px);right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.viewer-del{margin-top:18px;background:rgba(197,48,48,.85);border:none;color:#fff;padding:11px 28px;border-radius:4px;font-family:var(--sans);font-size:13px;cursor:pointer;letter-spacing:.5px}

/* DECISÃO */
.decisao-row{display:flex;gap:6px;padding:12px 16px}
.decisao-btn{flex:1;padding:13px 6px;text-align:center;border:1.5px solid rgba(0,0,0,.15);background:var(--branco);border-radius:4px;font-family:var(--sans);font-size:12px;color:var(--esp);cursor:pointer;transition:all .15s;-webkit-appearance:none;font-weight:400}
.decisao-btn.comprar{background:var(--preto);color:#fff;border-color:var(--preto)}
.decisao-btn.talvez{background:var(--esp);color:var(--off);border-color:var(--esp)}
.decisao-btn.nao{background:#C53030;color:#fff;border-color:#C53030}

/* BOTÃO SALVAR */
.btn-salvar{position:fixed;bottom:calc(16px + var(--safe-bot));left:50%;transform:translateX(-50%);background:var(--preto);color:#fff;border:none;font-family:var(--sans);font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:14px 44px;border-radius:4px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;gap:8px;white-space:nowrap}
.btn-salvar:active{opacity:.8}

/* TOAST */
.toast{position:fixed;bottom:calc(84px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--preto);color:#fff;padding:10px 20px;border-radius:4px;font-size:12px;letter-spacing:.5px;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* RESUMO */
.resumo-wrap{padding:16px 16px calc(20px + var(--safe-bot))}
.resumo-titulo{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:1px;margin-bottom:3px}
.resumo-sub{font-size:11px;color:var(--taupe);margin-bottom:20px}
.grupo-resumo{margin-bottom:20px}
.grupo-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid var(--borda);display:flex;align-items:center;gap:8px}
.grupo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.resumo-card{background:var(--branco);border:1px solid var(--borda);border-radius:4px;overflow:hidden;margin-bottom:8px;cursor:pointer}
.resumo-card:active{background:var(--off)}
.resumo-card-top{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--borda)}
.resumo-card-nome{font-size:13px;font-weight:500;flex:1}
.resumo-card-body{padding:10px 14px;display:flex;flex-direction:column;gap:5px}
.resumo-linha{display:flex;justify-content:space-between;font-size:12px;gap:8px}
.resumo-chave{color:var(--taupe);flex-shrink:0}
.resumo-val{color:var(--preto);text-align:right;max-width:60%}
.resumo-vazio{text-align:center;padding:50px 20px;color:var(--taupe);font-size:13px;line-height:2}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--preto);padding:8px 0 calc(8px + var(--safe-bot));display:flex;z-index:150;border-top:1px solid rgba(255,255,255,.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;color:rgba(255,255,255,.35);transition:color .15s;border:none;background:none;font-family:var(--sans)}
.nav-item.on{color:#fff}
.nav-icone{font-size:19px;line-height:1}
.nav-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase}

/* CORES */
.c-laranja{background:#E87722}.c-azul{background:#2B6CB0}.c-amarelo{background:#B7791F}
.c-verde{background:#2F855A}.c-branco{background:#8F8177}.c-vermelho{background:#C53030}.c-online{background:#553E97}
</style>
</head>

<script>
const LOJAS=[
  {id:0,nome:'HM Clothing',setor:'Laranja',cor:'c-laranja',loc:'Rua A, Box 85/87'},
  {id:1,nome:'Fernutti',setor:'Laranja',cor:'c-laranja',loc:'Rua C, Box 73/75'},

let DB={},lojaAtual=null,abertos={},viewerLoja=null,viewerIdx=null;

function load(){try{DB=JSON.parse(localStorage.getItem('usejl3')||'{}')}catch(e){DB={}}}
function save(){localStorage.setItem('usejl3',JSON.stringify(DB))}
function dv(id){return DB[id]||{}}
function sv(id,k,v){if(!DB[id])DB[id]={};DB[id][k]=v;atualizarStats()}

// NAV
function irTela(nome){
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  document.getElementById('tela-'+nome).classList.add('ativa');
  const ni=document.getElementById('nav-'+nome);
  if(ni)ni.classList.add('on');
  document.getElementById('btn-back').style.display='none';
  document.getElementById('topbar-logo').style.display='block';
  document.getElementById('topbar-title').style.display='none';
  if(nome==='resumo')renderResumo();
  if(nome==='home')renderHome();
}
function abrirFicha(id){
  lojaAtual=id;
  const l=LOJAS[id];
  document.getElementById('btn-back').style.display='flex';
  document.getElementById('topbar-logo').style.display='none';
  const tt=document.getElementById('topbar-title');
  tt.style.display='block';tt.textContent=l.nome;
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
  document.getElementById('tela-ficha').classList.add('ativa');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  renderFicha(id);
  document.getElementById('tela-ficha').scrollTo(0,0);
}
function voltarHome(){irTela('home')}

// HOME
function renderHome(){
  const grupos={};
  LOJAS.forEach(l=>{
    const s=l.setor==='Azul+Vm'?'Azul':l.setor;
    if(!grupos[s])grupos[s]=[];
    grupos[s].push(l);
  });
  const cont=document.getElementById('lista-setores');
  cont.innerHTML='';
  ORDEM.filter(s=>grupos[s]).forEach(setor=>{
    const lojas=grupos[setor];
    const open=abertos[setor]!==false;
    const cor=SETOR_COR[setor];
    const grp=document.createElement('div');
    const hdr=document.createElement('div');
    hdr.className='setor-header';
    hdr.innerHTML=`<div class="setor-dot" style="background:${cor}"></div><div class="setor-nome">${setor}</div><div class="setor-count">${lojas.length}</div><div class="setor-arrow">${open?'▲':'▼'}</div>`;
    hdr.onclick=()=>{abertos[setor]=!open;renderHome()};
    grp.appendChild(hdr);
    if(open){
      lojas.forEach(l=>{
        const av=dv(l.id);
        const dec=av.decisao||'';
        const tem=Object.keys(av).length>0;
        const item=document.createElement('div');
        item.className='loja-item';
        item.innerHTML=`<div class="loja-info"><div class="loja-nome">${l.nome}</div><div class="loja-loc">${l.loc}</div></div><div class="status-dot ${dec||(tem?'preenchido':'')}"></div>`;
        item.onclick=()=>abrirFicha(l.id);
        grp.appendChild(item);
      });
    }
    cont.appendChild(grp);
  });
  atualizarStats();
  document.getElementById('pill-data').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
}

function atualizarStats(){
  const aval=Object.keys(DB).filter(k=>Object.keys(DB[k]).length>0).length;
  const comp=Object.keys(DB).filter(k=>DB[k].decisao==='comprar').length;
  document.getElementById('st-aval').textContent=aval;
  document.getElementById('st-comp').textContent=comp;
}

  <div class="campo-row"><div class="campo-lbl">Faixa de preço</div><input class="campo-input" type="text" placeholder="Ex: R$40 – R$90" value="${av.faixa||''}" onchange="sv(${id},'faixa',this.value)"></div>
  <div class="campo-row"><div class="campo-lbl">Prazo de pagamento</div><input class="campo-input" type="text" placeholder="Ex: 30/60 dias ou à vista" value="${av.prazo||''}" onchange="sv(${id},'prazo',this.value)"></div>
  <div class="campo-row"><div class="campo-lbl">Desconto à vista</div><input class="campo-input" type="text" placeholder="Ex: 5%" value="${av.desc||''}" onchange="sv(${id},'desc',this.value)"></div>
  <div class="campo-row"><div class="campo-lbl">WhatsApp do vendedor</div><input class="campo-input" type="tel" placeholder="(81) 9xxxx-xxxx" value="${av.zap||''}" onchange="sv(${id},'zap',this.value)"></div>
</div>
<div class="secao">

  <div class="campo-row"><div class="campo-lbl">Aceita troca?</div>
    <select class="campo-input" onchange="sv(${id},'troca',this.value)">
      <option value="">Selecionar</option>
      <option ${av.troca==='Sim — por crédito'?'selected':''}>Sim — por crédito</option>
      <option ${av.troca==='Sim — troca por peça'?'selected':''}>Sim — troca por peça</option>
      <option ${av.troca==='Não aceita'?'selected':''}>Não aceita</option>
      <option ${av.troca==='Negocia caso a caso'?'selected':''}>Negocia caso a caso</option>
    </select>
  </div>
  <div class="campo-row"><div class="campo-lbl">Prazo para troca</div><input class="campo-input" type="text" placeholder="Ex: 30 dias" value="${av.ptoca||''}" onchange="sv(${id},'ptoca',this.value)"></div>
</div>

const SLBL={qual:['','Ruim','Regular','Boa','Muito boa','Excelente'],preco_n:['','Caro demais','Acima do ideal','Razoável','Bom custo','Ótimo'],atend:['','Frio','Regular','Bom','Muito bom','Excelente'],compat:['','Fora do perfil','Pouco alinhado','Compatível','Muito compat.','Perfeito']};

function mkStars(id,key,label){
  const v=dv(id)[key]||0;
  return `<div class="campo-row"><div class="campo-lbl">${label}</div>
  <div class="stars-row" id="sr-${id}-${key}">
    ${[1,2,3,4,5].map(n=>`<button class="star-btn ${v>=n?'on':''}" onclick="setStar(${id},'${key}',${n})">${n<=3?'●':n===4?'◆':'★'}</button>`).join('')}
  </div>
  <div class="star-txt" id="sl-${id}-${key}">${v?(SLBL[key]||[])[v]:'Não avaliado'}</div></div>`;
}

function setStar(id,key,n){
  sv(id,key,n);
  document.querySelectorAll(`#sr-${id}-${key} .star-btn`).forEach((b,i)=>b.classList.toggle('on',i<n));
  const el=document.getElementById(`sl-${id}-${key}`);
  if(el)el.textContent=(SLBL[key]||[])[n]||n;
}
function setC(id,key,val,btn){
  sv(id,key,val);
  const row=btn.closest('.compat-row');
  row.querySelectorAll('.compat-btn').forEach(b=>b.classList.remove('sim','nao','tal'));
  btn.classList.add(val==='sim'?'sim':val==='nao'?'nao':'tal');
}
function setDec(id,val,btn){
  sv(id,'decisao',val);save();
  const row=btn.closest('.decisao-row');
  row.querySelectorAll('.decisao-btn').forEach(b=>b.classList.remove('comprar','talvez','nao'));
  btn.classList.add(val);
  toast('Decisão: '+{comprar:'Comprar ✓',talvez:'Talvez ?',nao:'Não ✕'}[val]);
}

// FOTOS
function addFoto(id){document.getElementById(`finp-${id}`).click()}
function processFotos(id,files){
  if(!files||!files.length)return;
  const av=dv(id);if(!av.fotos)av.fotos=[];
  let pend=files.length;
  Array.from(files).forEach(file=>{
    // Compress before saving
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=800;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=h*MAX/w;w=MAX}else{w=w*MAX/h;h=MAX}}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const compressed=canvas.toDataURL('image/jpeg',0.75);
        av.fotos.push(compressed);
        pend--;
        if(pend===0){save();atualizarFotos(id);toast(`${files.length} foto${files.length>1?'s':''} salva${files.length>1?'s':''}!`)}
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function atualizarFotos(id){
  const fotos=dv(id).fotos||[];
  const grid=document.getElementById(`fgrid-${id}`);
  const cnt=document.getElementById(`fcnt-${id}`);
  if(!grid)return;
  grid.innerHTML=fotos.map((f,i)=>`<img class="foto-thumb" src="${f}" onclick="verFoto(${id},${i})">`).join('')+`<div class="foto-add" onclick="addFoto(${id})"><span class="foto-add-icone">📷</span><span class="foto-add-txt">Foto</span></div>`;
  if(cnt)cnt.textContent=`${fotos.length} foto${fotos.length!==1?'s':''} adicionada${fotos.length!==1?'s':''}`;
  // Re-bind input
  const inp=document.getElementById(`finp-${id}`);
  if(inp)inp.addEventListener('change',e=>processFotos(id,e.target.files));
}
function verFoto(id,idx){
  viewerLoja=id;viewerIdx=idx;
  document.getElementById('viewer-img').src=dv(id).fotos[idx];
  document.getElementById('foto-viewer').classList.add('aberto');
}
function fecharViewer(){document.getElementById('foto-viewer').classList.remove('aberto')}
function deletarFoto(){
  const av=dv(viewerLoja);
  av.fotos.splice(viewerIdx,1);
  save();atualizarFotos(viewerLoja);fecharViewer();toast('Foto removida');
}

// SALVAR
function salvarFicha(){save();toast('Avaliação salva ✓');setTimeout(voltarHome,700)}

// TOAST
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// RESUMO
function renderResumo(){
  const cont=document.getElementById('resumo-conteudo');
  const grupos={comprar:[],talvez:[],nao:[]};
  LOJAS.forEach(l=>{const av=dv(l.id);if(av.decisao)grupos[av.decisao].push({l,av})});
  const total=grupos.comprar.length+grupos.talvez.length+grupos.nao.length;
  if(!total){
    cont.innerHTML='<div class="resumo-titulo">RESUMO</div><div class="resumo-vazio">Nenhuma loja avaliada ainda.<br>Preencha as fichas e defina<br>a decisão final de cada uma.</div>';
    return;
  }
  let html=`<div class="resumo-titulo">RESUMO</div><div class="resumo-sub">${total} loja${total>1?'s':''} com decisão definida</div>`;
  [{key:'comprar',label:'Comprar com certeza',cor:'#2F855A'},{key:'talvez',label:'Avaliar melhor',cor:'#B7791F'},{key:'nao',label:'Não compatível',cor:'#C53030'}].forEach(cfg=>{
    if(!grupos[cfg.key].length)return;
    html+=`<div class="grupo-resumo"><div class="grupo-label"><div class="grupo-dot" style="background:${cfg.cor}"></div>${cfg.label} — ${grupos[cfg.key].length}</div>`;
    grupos[cfg.key].forEach(({l,av})=>{
      html+=`<div class="resumo-card" onclick="abrirFicha(${l.id})">
        <div class="resumo-card-top"><div class="resumo-card-nome">${l.nome}</div><span class="ficha-badge ${l.cor}" style="font-size:9px;padding:2px 8px;">${l.setor}</span></div>
        <div class="resumo-card-body">
          ${av.ped_min?`<div class="resumo-linha"><span class="resumo-chave">Ped. mínimo</span><span class="resumo-val">${av.ped_min}</span></div>`:''}
          ${av.faixa?`<div class="resumo-linha"><span class="resumo-chave">Faixa de preço</span><span class="resumo-val">${av.faixa}</span></div>`:''}
          ${av.troca?`<div class="resumo-linha"><span class="resumo-chave">Troca</span><span class="resumo-val">${av.troca}</span></div>`:''}
          ${av.est?`<div class="resumo-linha"><span class="resumo-chave">Estimativa</span><span class="resumo-val">${av.est}</span></div>`:''}
          ${av.zap?`<div class="resumo-linha"><span class="resumo-chave">WhatsApp</span><span class="resumo-val">${av.zap}</span></div>`:''}
          ${av.qual?`<div class="resumo-linha"><span class="resumo-chave">Qualidade</span><span class="resumo-val">${'●'.repeat(av.qual)}${'○'.repeat(5-av.qual)}</span></div>`:''}
          ${av.pecas?`<div class="resumo-linha" style="flex-direction:column;gap:3px"><span class="resumo-chave">Peças</span><span class="resumo-val" style="max-width:100%;text-align:left;font-size:11px;">${av.pecas.substring(0,100)}${av.pecas.length>100?'…':''}</span></div>`:''}
        </div></div>`;
    });
    html+='</div>';
  });
  cont.innerHTML=html;
}

// INIT
load();
ORDEM.forEach(s=>{abertos[s]=true});
renderHome();
</script>
